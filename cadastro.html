<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cadastro - Agenda Lux</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-white via-green-50 to-white flex items-center justify-center p-6">

  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-green-100 p-8">
    
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-gray-900">Agenda Lux</h1>
      <p class="text-gray-500 mt-2">Crie sua conta</p>
    </div>

    <form id="register-form" class="space-y-5">

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Nome</label>
        <input
          type="text"
          id="nome"
          placeholder="Seu nome"
          class="w-full rounded-xl border border-gray-300 px-4 py-3 outline-none focus:ring-2 focus:ring-green-500"
          required
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">E-mail</label>
        <input
          type="email"
          id="email"
          placeholder="seuemail@exemplo.com"
          class="w-full rounded-xl border border-gray-300 px-4 py-3 outline-none focus:ring-2 focus:ring-green-500"
          required
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
        <input
          type="password"
          id="password"
          placeholder="Mínimo 6 caracteres"
          class="w-full rounded-xl border border-gray-300 px-4 py-3 outline-none focus:ring-2 focus:ring-green-500"
          required
          minlength="6"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Confirmar senha</label>
        <input
          type="password"
          id="confirm-password"
          placeholder="Repita sua senha"
          class="w-full rounded-xl border border-gray-300 px-4 py-3 outline-none focus:ring-2 focus:ring-green-500"
          required
          minlength="6"
        />
      </div>

      <button
        type="submit"
        id="submit-btn"
        class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-3 rounded-xl transition disabled:opacity-70 disabled:cursor-not-allowed"
      >
        Criar conta
      </button>
    </form>

    <p id="message" class="text-sm text-center mt-4"></p>

    <p class="text-sm text-center text-gray-500 mt-6">
      Já tem conta?
      <a href="login.html" class="text-green-600 font-medium hover:underline">
        Entrar
      </a>
    </p>

  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const supabaseUrl = 'https://hljyiyxdvdkebbcylggm.supabase.co';
    const supabaseKey = 'sb_publishable_gMc4tk8Poxf2J9MKF5-_Ng_qCHhk6XD';

    const supabase = createClient(supabaseUrl, supabaseKey);

    const form = document.getElementById('register-form');
    const message = document.getElementById('message');
    const submitBtn = document.getElementById('submit-btn');

    function setMessage(text, type = 'default') {
      let colorClass = 'text-gray-500';

      if (type === 'success') colorClass = 'text-green-600';
      if (type === 'error') colorClass = 'text-red-600';

      message.textContent = text;
      message.className = `text-sm text-center mt-4 ${colorClass}`;
    }

    function setLoading(isLoading) {
      submitBtn.disabled = isLoading;
      submitBtn.textContent = isLoading ? 'Criando conta...' : 'Criar conta';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const nome = document.getElementById('nome').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm-password').value;

      if (!nome) {
        setMessage('Informe seu nome.', 'error');
        return;
      }

      if (password.length < 6) {
        setMessage('A senha deve ter no mínimo 6 caracteres.', 'error');
        return;
      }

      if (password !== confirmPassword) {
        setMessage('As senhas não coincidem.', 'error');
        return;
      }

      setLoading(true);
      setMessage('Criando conta...');

      try {
        const { error } = await supabase.auth.signUp({
          email,
          password,
          options: {
            data: {
              nome: nome
            }
          }
        });

        if (error) {
          setMessage('Erro: ' + error.message, 'error');
          setLoading(false);
          return;
        }

        setMessage('Conta criada com sucesso! Redirecionando...', 'success');

        setTimeout(() => {
          window.location.href = 'login.html';
        }, 1200);
      } catch (err) {
        setMessage('Erro inesperado ao criar conta.', 'error');
        setLoading(false);
      }
    });
  </script>

</body>
</html>
