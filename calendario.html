<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendário - Agenda Lux</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-white via-green-50 to-white text-gray-900">

  <!-- MENU -->
  <div id="menu-container"></div>

  <!-- CONTEÚDO -->
  <main class="md:ml-72 min-h-screen p-6 md:p-10">

    <!-- HEADER -->
    <div class="flex items-center justify-between mb-8">
      <div class="flex items-center gap-3">
        <button onclick="toggleMenu()" class="md:hidden text-3xl text-green-700">☰</button>
        <div>
          <h1 class="text-2xl md:text-3xl font-bold">Calendário</h1>
          <p class="text-gray-500">Gerencie sua agenda de shows</p>
        </div>
      </div>

      <button
        onclick="openCreateShowModal()"
        class="bg-green-600 text-white px-5 py-3 rounded-2xl hover:bg-green-700 transition"
      >
        + Criar Show
      </button>
    </div>

    <!-- CONTROLE DE MÊS -->
    <div class="flex justify-between items-center mb-6">
      <button onclick="prevMonth()" class="px-4 py-2 bg-white border rounded-xl hover:bg-gray-50 transition">
        ←
      </button>

      <h2 id="month-title" class="text-xl font-bold capitalize"></h2>

      <button onclick="nextMonth()" class="px-4 py-2 bg-white border rounded-xl hover:bg-gray-50 transition">
        →
      </button>
    </div>

    <!-- CALENDÁRIO -->
    <section id="calendar" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-7 gap-4"></section>

  </main>

  <!-- MODAL -->
  <div id="create-show-modal-container" class="relative z-50"></div>

  <!-- SCRIPTS -->
  <script src="assets/menu.js"></script>
  <script type="module" src="assets/project-guard.js?v=7"></script>
  <script type="module" src="assets/create-show-modal.js?v=7"></script>
  <script type="module" src="assets/calendar.js?v=7"></script>

  <!-- LÓGICA DO CALENDÁRIO -->
  <script>
    let currentMonth = new Date().getMonth() + 1
    let currentYear = new Date().getFullYear()

    function formatMonthTitle() {
      return new Date(currentYear, currentMonth - 1, 1).toLocaleDateString('pt-BR', {
        month: 'long',
        year: 'numeric'
      })
    }

    function getWeekDay(date) {
      return new Date(date + 'T12:00:00').toLocaleDateString('pt-BR', {
        weekday: 'long'
      })
    }

    window.renderCalendar = function () {
      const calendar = document.getElementById('calendar')
      calendar.innerHTML = ''

      const totalDays = new Date(currentYear, currentMonth, 0).getDate()
      const monthPadded = String(currentMonth).padStart(2, '0')

      for (let i = 1; i <= totalDays; i++) {
        const day = String(i).padStart(2, '0')
        const date = `${currentYear}-${monthPadded}-${day}`

        const el = document.createElement('div')
        el.className = 'bg-white rounded-3xl border border-green-100 shadow-sm p-4 min-h-[180px] flex flex-col'
        el.setAttribute('data-date', date)

        el.innerHTML = `
          <div class="flex justify-between items-start mb-3">
            <div>
              <span class="text-xl font-bold">${day}/${monthPadded}</span>
              <p class="text-sm text-gray-500 capitalize">${getWeekDay(date)}</p>
            </div>

            <button
              onclick="openCreateShowModal('${date}')"
              class="w-8 h-8 rounded-full bg-green-50 text-green-700 font-bold hover:bg-green-100 transition"
            >
              +
            </button>
          </div>

          <div class="events-container mt-auto">
            <div class="text-sm text-gray-400 text-center">
              Sem eventos
            </div>
          </div>
        `

        calendar.appendChild(el)
      }

      document.getElementById('month-title').innerText = formatMonthTitle()

      // 🔥 IMPORTANTE: garante que o calendar.js escute
      setTimeout(() => {
        document.dispatchEvent(new CustomEvent('calendar:rendered'))
      }, 50)
    }

    window.nextMonth = function () {
      currentMonth++
      if (currentMonth > 12) {
        currentMonth = 1
        currentYear++
      }
      renderCalendar()
    }

    window.prevMonth = function () {
      currentMonth--
      if (currentMonth < 1) {
        currentMonth = 12
        currentYear--
      }
      renderCalendar()
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderCalendar()
    })
  </script>

</body>
</html>
