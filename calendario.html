<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendário - Agenda Lux</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-white via-green-50 to-white text-gray-900 overflow-x-hidden">

<div id="menu-container"></div>

<main class="md:ml-72 min-h-screen p-6 md:p-10">

<div class="flex items-center justify-between mb-8">
  <div class="flex items-center gap-3">
    <button onclick="toggleMenu()" class="md:hidden text-3xl text-green-700">☰</button>
    <div>
      <h1 class="text-2xl md:text-3xl font-bold">Calendário</h1>
      <p class="text-gray-500">Gerencie sua agenda de shows</p>
    </div>
  </div>

  <button onclick="openCreateShowModal()" class="bg-green-600 text-white px-5 py-3 rounded-2xl">
    + Criar Show
  </button>
</div>

<section class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-7 gap-4">

<script>
const diasSemana = [
  "quarta-feira","quinta-feira","sexta-feira","sábado","domingo",
  "segunda-feira","terça-feira","quarta-feira","quinta-feira","sexta-feira",
  "sábado","domingo","segunda-feira","terça-feira","quarta-feira",
  "quinta-feira","sexta-feira","sábado","domingo","segunda-feira",
  "terça-feira","quarta-feira","quinta-feira","sexta-feira","sábado",
  "domingo","segunda-feira","terça-feira","quarta-feira","quinta-feira"
]

for(let i=1;i<=30;i++){
  const dia = String(i).padStart(2,'0')

  document.write(`
    <div class="bg-white rounded-3xl border border-green-100 shadow-sm p-4 min-h-[180px] flex flex-col" data-date="2026-04-${dia}">

      <div class="flex items-start justify-between mb-3">
        <div>
          <span class="text-xl font-bold">${dia}/04</span>
          <p class="text-sm text-gray-500">${diasSemana[i-1]}</p>
        </div>

        <button onclick="openCreateShowModal('2026-04-${dia}')" 
          class="w-8 h-8 rounded-full bg-green-50 text-green-700 font-bold hover:bg-green-100">
          +
        </button>
      </div>

      <div class="events-container mt-auto text-sm text-gray-400">
        Sem eventos
      </div>

    </div>
  `)
}
</script>

</section>

</main>

<div id="create-show-modal-container"></div>

<script src="assets/menu.js"></script>
<script type="module" src="assets/create-show-modal.js"></script>
<script type="module" src="assets/calendar.js"></script>

</body>
</html>
