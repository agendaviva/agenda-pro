<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Convite - Agenda Lux</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-white via-green-50 to-white text-gray-900 min-h-screen flex items-center justify-center p-6">

  <div class="w-full max-w-md bg-white border border-green-100 rounded-3xl shadow-sm p-8">
    <div class="text-center mb-6">
      <p class="text-sm uppercase tracking-[0.18em] text-green-600 font-semibold mb-2">
        Agenda Lux
      </p>
      <h1 class="text-2xl font-bold text-gray-900">Convite para equipe</h1>
      <p class="text-gray-500 mt-2 text-sm">
        Aceite o convite para entrar em uma agenda
      </p>
    </div>

    <div class="bg-green-50 border border-green-100 rounded-2xl p-4 mb-6">
      <p class="text-sm text-gray-500 mb-1">Status</p>
      <p id="inviteStatus" class="font-medium text-gray-900">Carregando convite...</p>
    </div>

    <div id="inviteInfo" class="hidden space-y-4 mb-6">
      <div>
        <label class="text-sm text-gray-500">E-mail convidado</label>
        <input
          id="inviteEmail"
          type="text"
          disabled
          class="w-full mt-1 px-4 py-3 rounded-xl bg-gray-100 text-gray-600 border border-gray-200"
        >
      </div>

      <div>
        <label class="text-sm text-gray-500">Permissão</label>
        <input
          id="inviteRole"
          type="text"
          disabled
          class="w-full mt-1 px-4 py-3 rounded-xl bg-gray-100 text-gray-600 border border-gray-200"
        >
      </div>
    </div>

    <div class="space-y-3">
      <button
        id="acceptInviteBtn"
        class="hidden w-full bg-green-600 hover:bg-green-700 text-white px-5 py-3 rounded-xl font-semibold transition"
        type="button"
      >
        Aceitar convite
      </button>

      <button
        id="goLoginBtn"
        class="hidden w-full bg-white hover:bg-gray-50 text-gray-900 border border-gray-300 px-5 py-3 rounded-xl font-semibold transition"
        type="button"
      >
        Entrar com outra conta
      </button>
    </div>
  </div>

  <script type="module" src="assets/supabase.js?v=2"></script>
  <script type="module" src="assets/convite.js?v=2"></script>
</body>
</html>
