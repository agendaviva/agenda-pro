<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Financeiro - Agenda Lux</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-white via-green-50 to-white text-gray-900 overflow-x-hidden">

  <div id="menu-container"></div>

  <main class="md:ml-72 min-h-screen p-6 md:p-10">

    <div class="mb-8">
      <h1 class="text-2xl md:text-3xl font-bold">Financeiro</h1>
      <p class="text-gray-500">Resumo financeiro dos seus shows</p>
    </div>

    <!-- CARDS -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">

      <div class="bg-white rounded-2xl p-4 shadow border">
        <p class="text-sm text-gray-500">Confirmado</p>
        <p id="totalConfirmado" class="text-xl font-bold text-green-700">R$ 0</p>
      </div>

      <div class="bg-white rounded-2xl p-4 shadow border">
        <p class="text-sm text-gray-500">Reservas</p>
        <p id="totalReserva" class="text-xl font-bold text-amber-600">R$ 0</p>
      </div>

      <div class="bg-white rounded-2xl p-4 shadow border">
        <p class="text-sm text-gray-500">Total</p>
        <p id="totalGeral" class="text-xl font-bold text-gray-900">R$ 0</p>
      </div>

      <div class="bg-white rounded-2xl p-4 shadow border">
        <p class="text-sm text-gray-500">Shows</p>
        <p id="totalShows" class="text-xl font-bold text-gray-900">0</p>
      </div>

    </div>

    <!-- LISTA -->
    <div class="bg-white rounded-2xl shadow border p-4">
      <h2 class="font-semibold mb-4">Shows</h2>
      <div id="financeList" class="space-y-2"></div>
    </div>

  </main>

  <script type="module" src="assets/supabase.js"></script>
  <script type="module" src="assets/financeiro.js"></script>

</body>
</html>
