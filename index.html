<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white">

  <!-- NAVBAR -->
  <nav class="flex justify-between items-center p-6 max-w-6xl mx-auto">
    <h1 class="text-2xl font-bold">Agenda Pro</h1>
    <div class="space-x-4">
      <button onclick="showLogin()" class="text-gray-300">Login</button>
      <button onclick="showRegister()" class="bg-green-500 px-4 py-2 rounded-xl">Criar Conta</button>
    </div>
  </nav>

  <!-- HOME -->
  <section id="home" class="min-h-screen flex flex-col items-center justify-center text-center px-4">
    <h1 class="text-4xl md:text-6xl font-bold mb-6">
      Sua Agenda de Shows no WhatsApp 🚀
    </h1>
    <p class="text-lg md:text-xl text-gray-300 max-w-2xl mb-8">
      Automatize confirmações e lembretes de shows com integração total ao WhatsApp.
    </p>
    <button onclick="showRegister()" class="bg-green-500 hover:bg-green-600 px-8 py-4 rounded-2xl text-lg font-semibold">
      Começar Agora
    </button>
  </section>

  <!-- LOGIN -->
  <section id="login" class="hidden min-h-screen flex items-center justify-center">
    <div class="bg-gray-900 p-8 rounded-2xl w-full max-w-md">
      <h2 class="text-2xl font-bold mb-6 text-center">Login</h2>
      <input type="email" placeholder="Email" class="w-full mb-4 p-3 rounded bg-black border border-gray-700">
      <input type="password" placeholder="Senha" class="w-full mb-6 p-3 rounded bg-black border border-gray-700">
      <button class="w-full bg-green-500 py-3 rounded-xl">Entrar</button>
      <p class="text-center mt-4 text-gray-400">
        Não tem conta? <span onclick="showRegister()" class="text-green-400 cursor-pointer">Criar</span>
      </p>
    </div>
  </section>

  <!-- REGISTER -->
  <section id="register" class="hidden min-h-screen flex items-center justify-center">
    <div class="bg-gray-900 p-8 rounded-2xl w-full max-w-md">
      <h2 class="text-2xl font-bold mb-6 text-center">Criar Conta</h2>
      <input type="text" placeholder="Nome" class="w-full mb-4 p-3 rounded bg-black border border-gray-700">
      <input type="email" placeholder="Email" class="w-full mb-4 p-3 rounded bg-black border border-gray-700">
      <input type="password" placeholder="Senha" class="w-full mb-6 p-3 rounded bg-black border border-gray-700">
      <button class="w-full bg-green-500 py-3 rounded-xl">Cadastrar</button>
      <p class="text-center mt-4 text-gray-400">
        Já tem conta? <span onclick="showLogin()" class="text-green-400 cursor-pointer">Entrar</span>
      </p>
    </div>
  </section>

  <script>
    function showLogin() {
      document.getElementById('home').classList.add('hidden');
      document.getElementById('register').classList.add('hidden');
      document.getElementById('login').classList.remove('hidden');
    }

    function showRegister() {
      document.getElementById('home').classList.add('hidden');
      document.getElementById('login').classList.add('hidden');
      document.getElementById('register').classList.remove('hidden');
    }
  </script>

</body>
</html>
