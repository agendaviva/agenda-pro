<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova Agenda - Agenda Lux</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-white via-green-50 to-white text-gray-900 overflow-x-hidden">

  <div id="menu-container"></div>

  <main class="md:ml-72 min-h-screen p-6 md:p-10">
    <div class="flex items-center gap-3 mb-8">
      <button type="button" onclick="window.toggleMenu()" class="md:hidden text-3xl text-green-700 leading-none">
        ☰
      </button>

      <div>
        <h1 class="text-2xl md:text-3xl font-bold">Criar nova agenda</h1>
        <p class="text-sm md:text-base text-gray-500">Adicione uma nova banda ao seu painel</p>
      </div>
    </div>

    <section class="bg-white border border-green-100 rounded-3xl p-6 shadow-sm max-w-2xl">
      <h2 class="text-lg font-semibold mb-4">Dados da agenda</h2>

      <form id="newProjectForm" class="space-y-5">
        <div>
          <label class="text-sm text-gray-500">Nome da banda / agenda</label>
          <input
            id="projectName"
            type="text"
            placeholder="Ex: Banda X"
            class="w-full mt-1 px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-green-500 outline-none"
            required
          />
        </div>

        <button
          type="submit"
          id="createProjectBtn"
          class="bg-green-600 hover:bg-green-700 text-white px-5 py-3 rounded-xl font-semibold transition"
        >
          Criar agenda
        </button>

        <p id="projectMessage" class="text-sm mt-2"></p>
      </form>
    </section>
  </main>

  <script type="module" src="assets/supabase.js"></script>
  <script src="assets/menu.js"></script>
  <script type="module" src="assets/novo-projeto.js"></script>
</body>
</html>
