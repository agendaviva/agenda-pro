<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel ADM - Agenda Lux</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-white via-green-50 to-white text-gray-900 overflow-x-hidden">

  <div id="menu-container"></div>

  <main class="md:ml-72 min-h-screen p-6 md:p-10">
    <div class="flex items-center gap-3 mb-8">
      <button type="button" onclick="window.toggleMenu()" class="md:hidden text-3xl text-green-700 leading-none">
        ☰
      </button>

      <div>
        <h1 class="text-2xl md:text-3xl font-bold">Painel ADM</h1>
        <p class="text-sm md:text-base text-gray-500">Gerencie moedas e usuários</p>
      </div>
    </div>

    <section class="bg-white border border-green-100 rounded-3xl p-6 shadow-sm mb-8">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="md:col-span-2">
          <label class="text-sm text-gray-500">Buscar por nome ou e-mail</label>
          <input
            id="searchInput"
            type="text"
            placeholder="Digite nome ou e-mail"
            class="w-full mt-1 px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-green-500 outline-none"
          />
        </div>

        <div class="flex items-end">
          <button
            id="reloadBtn"
            type="button"
            class="w-full bg-green-600 hover:bg-green-700 text-white px-5 py-3 rounded-xl font-semibold transition"
          >
            Atualizar lista
          </button>
        </div>
      </div>

      <p id="adminMessage" class="text-sm mt-4 text-gray-500"></p>
    </section>

    <section class="bg-white border border-green-100 rounded-3xl p-6 shadow-sm">
      <div class="flex items-center justify-between mb-5">
        <div>
          <h2 class="text-xl font-bold text-gray-900">Usuários</h2>
          <p class="text-sm text-gray-500 mt-1">
            Adicione ou remova moedas manualmente
          </p>
        </div>
      </div>

      <div id="usersList" class="space-y-4">
        <div class="text-sm text-gray-400">Carregando usuários...</div>
      </div>
    </section>
  </main>

  <script type="module" src="assets/supabase.js"></script>
  <script src="assets/menu.js"></script>
  <script type="module" src="assets/painel-admin.js"></script>
</body>
</html>
