<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plano expirado - Agenda Lux</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-white via-green-50 to-white flex items-center justify-center p-6">

  <div class="w-full max-w-xl bg-white border border-green-100 rounded-3xl shadow-xl p-8 text-center">
    <div class="w-20 h-20 mx-auto mb-6 rounded-full bg-red-50 flex items-center justify-center text-4xl">
      ⚠️
    </div>

    <h1 class="text-3xl font-bold text-gray-900 mb-3">
      Seu plano expirou
    </h1>

    <p class="text-gray-500 text-base leading-relaxed mb-6">
      Esta agenda está temporariamente bloqueada porque o período de 30 dias terminou.
      Para reativar, fale com o suporte e realize a renovação.
    </p>

    <div class="bg-green-50 border border-green-100 rounded-2xl p-4 mb-6 text-left">
      <p class="text-sm text-gray-500 mb-1">Projeto atual</p>
      <p id="expiredProjectName" class="font-semibold text-gray-900">Carregando...</p>
    </div>

    <div class="flex flex-col sm:flex-row gap-3 justify-center">
      <a
        href="https://wa.me/5573999972001"
        target="_blank"
        class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-2xl font-semibold transition"
      >
        Falar com suporte
      </a>

      <button
        type="button"
        onclick="window.location.href='dashboard.html'"
        class="bg-white border border-gray-300 hover:bg-gray-50 text-gray-800 px-6 py-3 rounded-2xl font-semibold transition"
      >
        Voltar
      </button>
    </div>
  </div>

  <script type="module">
    import { supabase } from './assets/supabase.js'

    const projectNameEl = document.getElementById('expiredProjectName')
    const activeProjectId = localStorage.getItem('activeProjectId')

    async function loadProjectName() {
      if (!activeProjectId) {
        projectNameEl.textContent = 'Nenhum projeto selecionado'
        return
      }

      const { data } = await supabase
        .from('projects')
        .select('name')
        .eq('id', activeProjectId)
        .single()

      projectNameEl.textContent = data?.name || 'Projeto não encontrado'
    }

    loadProjectName()
  </script>
</body>
</html>
